<HTML>
	<HEAD>
		<TITLE>Week-end &#224; Brulon</TITLE>
		<META http-equiv="content-Type" content="text/html; charset=iso-8859-1">
		<META name="Generator" content="Adobe Photoshop Album">
		<META name="Author" content="Adobe Systems, Inc.">
		<META name="Keywords" content="Adobe Atmosphere, Atmosphere, 3d Gallery, Photo Gallery, Adobe Atmosphere 3D Gallery">
		<META name="Description" content="An Atmosphere 3D Photo Gallery which uses the Adobe Atmosphere Plugin. Visit www.adobe.com/products/atmosphere/ for the latest news and information on Adobe Atmosphere.">
		<SCRIPT LANGUAGE="javascript" src="Gallery/AtmosphereInterface.js">
			var vmp; //required for plugin load
		</SCRIPT>
		<SCRIPT LANGUAGE="javascript">
			var worldScriptLoaded = false;
			function worldLoaded()
			{
				worldScriptLoaded = true;
			}
		</SCRIPT>
		<SCRIPT LANGUAGE="javascript">
			function populateMenu(setNumber, setName)
			{
				document.forms["myForm"].imageSet.options[setNumber - 1]= new Option(setName, setNumber, false, false);
				if ( setNumber == 0 )
				{
					document.forms["myForm"].imageSet.options[0].selected=true;
				}
			}

			function updateMenu(currentSet)
			{
				document.forms["myForm"].imageSet.options[currentSet - 1].selected=true;
			}

			function showChat(state)
			{
				if (!worldScriptLoaded)
				{
					document.forms["myForm"].chatCheckbox.checked = false;
				}
				else if (state == true)
				{
					document.all.MetaCtl0.PluginCommand("turnOnChat()", 0, 0);
				}
				else
				{
					document.all.MetaCtl0.PluginCommand("turnOffChat()", 0, 0);
				}
				document.forms["myForm"].chatCheckbox.blur();
			}
			
			function tourButtonPressed()
			{
				document.all.MetaCtl0.PluginCommand("tourButtonPressed();", 0, 0);
			}

			function setTourButtonLabelStart()
			{
				document.forms["myForm"].tourButton.value = "Démarrer la visite guidée";
			}

			function setTourButtonLabelStop()
			{
				document.forms["myForm"].tourButton.value = "Arrêter la visite guidée";
			}

		</SCRIPT>
	</HEAD>
	<BODY bgcolor="#FFFFFF"  leftmargin="20" marginwidth="20" topmargin="20" marginheight="20" text="#000000"  link="#0000FF"  vlink="#800080"  alink="#FF0000" >

		<FORM name="myForm">
			<FONT size="5"  face="Arial" >
			<font color="#000000" > Photos:
			<SELECT NAME="imageSet" onChange="document.all.MetaCtl0.PluginCommand('loadAll.defineSet(' + this.value + ');', 0, 0);"></SELECT>&nbsp;&nbsp;
			<SCRIPT>
			if (false)
			{
				document.write('<INPUT TYPE="checkbox" NAME="chatCheckbox" value=off onClick=showChat(this.checked)><font color="#000000" > %3DGALLERYCHAT%&nbsp;&nbsp');
			}
			if (true)
			{
				document.write("<INPUT TYPE='button' NAME='tourButton' VALUE='' onClick=tourButtonPressed()>&nbsp;&nbsp");
			}
			</SCRIPT>
			</FONT>
		</FORM>

		<SCRIPT LANGUAGE="javascript">
			atmoVerticalSize = 100 - (Math.pow("5" , 2) / 2);
			if (atmoVerticalSize > 90)
			{
				atmoVerticalSize = 90;
			}
			vmp = new MTSPlugin("./Gallery/gallery_no_chat.aer", "100%", atmoVerticalSize + "%", "", "classic", "ContentType=1; CreatorApplication=PhotoshopAlbum1;");
		</SCRIPT>


	</BODY>
</HTML>
